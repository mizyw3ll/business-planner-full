<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .btn { background: #4F46E5; color: white; padding: 12px 24px;
               text-decoration: none; border-radius: 6px; display: inline-block; }
        .btn-danger { background: #DC2626; color: white; padding: 12px 24px;
               text-decoration: none; border-radius: 6px; display: inline-block; }
        .footer { color: #666; font-size: 12px; margin-top: 40px; }
        .warning { background: #FEF3C7; border-left: 4px solid #F59E0B;
                   padding: 12px; margin: 20px 0; }
        .info { background: #EFF6FF; border-left: 4px solid #3B82F6;
                padding: 12px; margin: 20px 0; }
        .alert { background: #FEE2E2; border-left: 4px solid #DC2626;
                 padding: 12px; margin: 20px 0; }
    </style>
    <title>{% block title %}Email{% endblock %}</title>
</head>
<body>
    <div class="container">
        {% block content %}
        {% endblock %}

        <div class="footer">
            {% block footer %}
            <p>© 2026 Конструктор бизнес-планов</p>
            {% endblock %}
        </div>
    </div>
</body>
</html>
